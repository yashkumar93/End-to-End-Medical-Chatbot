services:
  app:
    build: .
    container_name: medical-chatbot-app
    env_file:
      - .env
    environment:
      - PORT=8080
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: medical-chatbot-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/digitalocean/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
